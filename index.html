<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="container nav">
      <h1> Shop</h1>
      <div class="nav-btns">
        <button class="add-product-btn" onclick="openModal()">+ Add Product</button>
        <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
      </div>
    </div>
  </header>

  <div id="msg" class="msg" style="display:none"></div>

  <main class="container main-layout">

    <section class="products-section">
      <h2>Products</h2>
      <div id="products" class="products-grid"></div>
    </section>

    <section class="cart-section">
      <h2>Your Cart</h2>
      <div id="cart" class="cart-list"></div>
      <p id="total" class="cart-total">Total: $0.00</p>
    </section>

  </main>

  <div id="modal" class="modal-overlay" style="display:none" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Product</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <input type="hidden" id="editId" />
      <label>Name *</label>
      <input type="text"   id="pName"  placeholder="e.g. MacBook Air" />
      <label>Description</label>
      <input type="text"   id="pDesc"  placeholder="Short description" />
      <label>Price ($) *</label>
      <input type="number" id="pPrice" placeholder="e.g. 999.00" min="0" step="0.01" />
      <label>Stock</label>
      <input type="number" id="pStock" placeholder="e.g. 10" min="0" />
      <label>Image URL</label>
      <input type="text"   id="pImage" placeholder="https://..." />
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save"   onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
